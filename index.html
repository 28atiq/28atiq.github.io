<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>28atiq</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
color:#111;
overflow:hidden;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.intro-text{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

/* MAIN */

#main{
display:none;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.greeting{
font-size:20px;
color:#666;
margin-bottom:15px;
}

.title{
font-size:42px;
font-weight:700;
}

.logo{
font-size:100px;
font-weight:900;
color:#d4af37;
margin-top:15px;
}

.tagline{
margin-top:15px;
font-size:18px;
color:#666;
}

.instagram-btn{
margin-top:30px;
padding:14px 35px;
background:#111;
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
transition:.3s;
}

.instagram-btn:active{
transform:scale(.95);
}

</style>
</head>

<body>

<div id="intro">

<div class="intro-text">
INITIALIZING...
</div>

<div class="intro-text">
ACCESS GRANTED...
</div>

<div class="intro-text">
WELCOME TO 28ATIQ
</div>

</div>

<div id="main">

<section class="hero">

<div id="greeting" class="greeting">
Welcome to 28atiq
</div>

<div class="title">
WELCOME TO 28ATIQ
</div>

<div class="logo">
²⁸atiq
</div>

<div class="tagline">
Simplicity • Identity • Individuality
</div>

<a
class="instagram-btn"
href="https://instagram.com/28atiq"
target="_blank">

Instagram

</a>

</section>

</div>

<script>

setTimeout(function(){

document.getElementById("intro").style.display="none";

document.getElementById("main").style.display="block";

},3000);

const greeting=document.getElementById("greeting");

const hour=new Date().getHours();

if(hour<12){

greeting.innerText=
"Good Morning, Welcome to 28atiq";

}
else if(hour<18){

greeting.innerText=
"Good Afternoon, Welcome to 28atiq";

}
else{

greeting.innerText=
"Good Evening, Welcome to 28atiq";

}

</script>

</body>
</html>
